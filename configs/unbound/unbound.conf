server:
  verbosity: 1
  interface: 127.0.0.1@5335
  interface: 0.0.0.0@5335
  do-ip4: yes
  do-udp: yes
  do-tcp: yes
  do-ip6: no

  # Full recursive resolution — no forwarders. Unbound walks the DNS tree
  # itself starting from the root servers (root.hints).
  root-hints: "/opt/unbound/etc/unbound/root.hints"
  auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

  # Allow local loopback and all private local subnets
  access-control: 127.0.0.0/8 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow

  hide-identity: yes
  hide-version: yes

  num-threads: 1

  # Hardening / performance (per Pi-hole recursive-DNS guide)
  qname-minimisation: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  edns-buffer-size: 1232
  prefetch: yes
  cache-min-ttl: 0
  cache-max-ttl: 86400
  msg-cache-size: 64m
  rrset-cache-size: 128m
  so-rcvbuf: 1m
