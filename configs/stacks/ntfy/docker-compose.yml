services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - 8095:80
    volumes:
      - /home/<user>/docker/ntfy-config:/etc/ntfy
      - /home/<user>/docker/ntfy-cache:/var/cache/ntfy
    environment:
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\":true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
