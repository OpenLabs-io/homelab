services:
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=300
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  health-notifier:
    image: alpine:latest
    container_name: health-notifier
    restart: unless-stopped
    depends_on:
      - autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl docker-cli > /dev/null 2>&1;
        echo 'Health notifier started';
        docker events --filter event=health_status --format '{{.Actor.Attributes.name}} {{.Action}}' | while read line; do
          container=$$(echo $$line | awk '{print $$1}');
          status=$$(echo $$line | awk '{print $$2}');
          if echo "$$status" | grep -q 'unhealthy'; then
            curl -s -u <user>:<REDACTED> \
              -H 'Title: Container Unhealthy' \
              -H 'Priority: high' \
              -H 'Tags: warning' \
              -d "$$container went unhealthy - autoheal will restart it" \
              http://<LAN_IP>:8095/<ntfy-topic> > /dev/null;
          fi;
        done
